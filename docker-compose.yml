services:
  api-gateway:
    build: .
    container_name: api-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./authorized_keys:/app/authorized_keys:ro
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - GATEWAY_CONFIG=/app/config.yaml
      - PUBLIC_PORT=8080
      - RTUNNEL_BINARY=/usr/local/bin/rtunnel
    restart: unless-stopped
