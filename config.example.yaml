listen:
  host: 127.0.0.1
  port: 18080

# External URL that reaches nginx's single public port. Keep the path prefix
# if the cluster exposes the container as /proxy/<port>/.
public_base_url: https://example.com/proxy/8080

auth:
  enabled: true
  token_ttl_seconds: 43200
  users:
    - username: admin
      # password: demo-password
      password_hash: pbkdf2_sha256$100000$YXBpLWdhdGV3YXktZGVtbw$eyNTAtzzZChzl7SYBzwIJekf_5Y2TRkrxSWZ5U_Ioz0

ssh:
  host: 127.0.0.1
  port: 2222
  user: root
  authorized_keys_path: /root/.ssh/authorized_keys

rtunnel:
  binary: rtunnel
  target: 127.0.0.1:2222
  listen: 127.0.0.1:10022
  public_path: /tunnel/
  client_local_addr: 127.0.0.1:2226

tmux:
  binary: tmux
  session_prefix: gateway-
  default_cwd: /workspace
  command_timeout_seconds: 10
